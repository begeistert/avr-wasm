<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AVR Assembler host</title>
    <style>
        body { font: 13px system-ui, sans-serif; padding: 8px; color: #333; }
        pre  { white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>
    <p id="status">Loading toolchain…</p>
    <pre id="log"></pre>

    <!--
        avr-as.js, avr-ld.js and objcopy.js are emscripten modules built
        with -sMODULARIZE=1, so each one assigns its factory to the global
        named in its `EXPORT_NAME`.  The default `EXPORT_NAME` for all of
        them is `Module`, which would clash, so we capture each global as
        soon as the corresponding script has loaded.
    -->
    <script src="avr-as.js"></script>
    <script>window.__avrAsFactory = window.Module; delete window.Module;</script>

    <script src="avr-ld.js"></script>
    <script>window.__avrLdFactory = window.Module; delete window.Module;</script>

    <script src="objcopy.js"></script>
    <script>window.__objcopyFactory = window.Module; delete window.Module;</script>

    <script src="pipeline.js"></script>
</body>
</html>
