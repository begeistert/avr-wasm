name: CI

on:
  push:
    tags:
      - "v*"
    branches-ignore:
      - "renovate/**"
      - "dependabot/**"
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  CHECKOUT_REF: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest

    if: "${{ github.event_name != 'push' || !startsWith(github.ref, 'refs/pull/') }}"

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - uses: docker/setup-buildx-action@v3

      - uses: crazy-max/ghaction-github-runtime@v3

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Publish
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        id: publish
        run: |
          pnpm config set '//registry.npmjs.org/:_authToken' '${{ secrets.NPM_TOKEN }}'
          pnpm -r publish --provenance --access public --no-git-checks

      - name: Publish (dry-run)
        if: steps.publish.outcome != 'success'
        run: pnpm -r publish --dry-run --no-git-checks

      - name: Find dist directories
        id: find-dists
        run: |
          echo 'dirs<<EOF' >> $GITHUB_OUTPUT
          for dir in $(find . -type d -name "*dist" -not -path "*/node_modules/*"); do
            echo $dir >> $GITHUB_OUTPUT
          done
          echo 'EOF' >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v5
        with:
          name: dists
          path: ${{ steps.find-dists.outputs.dirs }}
