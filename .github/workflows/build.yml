name: Build

on:
  push:
    tags:
      - "v*"
    branches-ignore:
      - "renovate/**"
      - "dependabot/**"
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  CHECKOUT_REF: ${{ github.event.pull_request.head.sha || github.sha }}
  BINUTILS_BRANCH: binutils-2_45-branch

jobs:
  build-gas:
    runs-on: ubuntu-latest

    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/pull/')

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - uses: docker/setup-buildx-action@v3

      - uses: crazy-max/ghaction-github-runtime@v3

      - name: Build avr-as
        run: |
          docker buildx build \
            --progress=plain \
            --build-arg=BRANCH=${{ env.BINUTILS_BRANCH }} \
            --cache-to=type=gha,mode=max,scope=gas \
            --cache-from=type=gha,scope=gas \
            --output=type=local,dest=dist \
            src/gas

      - name: Test avr-as output
        run: |
          test -s dist/avr-as.js
          echo "avr-as.js exists and is non-empty"

      - name: Upload avr-as artifact
        uses: actions/upload-artifact@v4
        with:
          name: avr-as
          path: dist/

  build-binutils:
    runs-on: ubuntu-latest

    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/pull/')

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - uses: docker/setup-buildx-action@v3

      - uses: crazy-max/ghaction-github-runtime@v3

      - name: Build binutils
        run: |
          docker buildx build \
            --progress=plain \
            --build-arg=BRANCH=${{ env.BINUTILS_BRANCH }} \
            --cache-to=type=gha,mode=max,scope=binutils \
            --cache-from=type=gha,scope=binutils \
            --output=type=local,dest=dist \
            src/binutils

      - name: Test binutils output
        run: |
          for tool in addr2line ar cxxfilt elfedit nm objcopy objdump ranlib readelf size strings strip; do
            test -s "dist/${tool}.js"
            echo "${tool}.js exists and is non-empty"
          done

      - name: Upload binutils artifact
        uses: actions/upload-artifact@v4
        with:
          name: binutils
          path: dist/

  build-avr-ld:
    runs-on: ubuntu-latest

    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/pull/')

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - uses: docker/setup-buildx-action@v3

      - uses: crazy-max/ghaction-github-runtime@v3

      - name: Build avr-ld
        run: |
          docker buildx build \
            --progress=plain \
            --build-arg=BRANCH=${{ env.BINUTILS_BRANCH }} \
            --cache-to=type=gha,mode=max,scope=avr-ld \
            --cache-from=type=gha,scope=avr-ld \
            --output=type=local,dest=dist \
            src/avr-ld

      - name: Test avr-ld output
        run: |
          test -s dist/avr-ld.js
          echo "avr-ld.js exists and is non-empty"
          # Sidecar avr-libc tree (libc.a / libm.a per family,
          # plus device-specific crt<mcu>.o objects).
          for f in \
              dist/avr-libc/avr5/libc.a \
              dist/avr-libc/avr5/libm.a \
              dist/avr-libc/avr5/crtm328p.o \
              dist/avr-libc/avr6/libc.a \
              dist/avr-libc/avr6/crtm2560.o \
              dist/avr-libc/avr25/libc.a \
              dist/avr-libc/avr25/crtt85.o; do
              test -s "$f" || { echo "missing $f"; exit 1; }
          done
          echo "avr-libc sidecar files present"

      - name: Upload avr-ld artifact
        uses: actions/upload-artifact@v4
        with:
          name: avr-ld
          path: dist/

  package:
    runs-on: ubuntu-latest
    needs: [build-gas, build-binutils, build-avr-ld]

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Upload combined artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: avr-wasm
          path: dist/

      - name: Create GitHub Release
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            dist/*

