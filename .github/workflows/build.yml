name: Build

on:
  push:
    tags:
      - "v*"
    branches-ignore:
      - "renovate/**"
      - "dependabot/**"
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  CHECKOUT_REF: ${{ github.event.pull_request.head.sha || github.sha }}
  BINUTILS_BRANCH: binutils-2_45-branch

jobs:
  build:
    runs-on: ubuntu-latest

    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/pull/')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - uses: docker/setup-buildx-action@v3

      - uses: crazy-max/ghaction-github-runtime@v3

      - name: Build avr-as
        run: |
          docker buildx build \
            --progress=plain \
            --build-arg=BRANCH=${{ env.BINUTILS_BRANCH }} \
            --cache-to=type=gha,mode=max,scope=gas \
            --cache-from=type=gha,scope=gas \
            --output=type=local,dest=dist \
            src/gas

      - name: Build binutils
        run: |
          docker buildx build \
            --progress=plain \
            --build-arg=BRANCH=${{ env.BINUTILS_BRANCH }} \
            --cache-to=type=gha,mode=max,scope=binutils \
            --cache-from=type=gha,scope=binutils \
            --output=type=local,dest=dist \
            src/binutils

      - name: Build avr-ld
        run: |
          docker buildx build \
            --progress=plain \
            --build-arg=BRANCH=${{ env.BINUTILS_BRANCH }} \
            --cache-to=type=gha,mode=max,scope=avr-ld \
            --cache-from=type=gha,scope=avr-ld \
            --output=type=local,dest=dist \
            src/avr-ld

      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: avr-wasm
          path: dist/

      - name: Create GitHub Release
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            dist/*

